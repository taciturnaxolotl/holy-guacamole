# Solder project configuration. This file is applied to KiCad on every compile.
[jlc]
layers = 2
thickness_mm = 1.6
color = "green"
silkscreen = "white"
surface_finish = "hasl_leadfree"
copper_weight_oz = 1
via_process = "tented"
material = "fr4"
quantity = 5

[jlc.assembly]
side = "top"
type = "economic"
quantity = 5

# Declared netclasses update matching KiCad entries. Classes and patterns on unmanaged KiCad classes are preserved.
[netclasses."Default"]
clearance_mm = 0.2
track_width_mm = 0.25
via_diameter_mm = 0.8
via_drill_mm = 0.4
patterns = []
